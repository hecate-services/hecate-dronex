<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 600" font-family="'Helvetica Neue',Arial,sans-serif">
  <defs>
    <style>
      .title { font-size:26px; font-weight:700; fill:#0f2540; }
      .sub   { font-size:14px; fill:#6b7a8d; }
      .w     { fill:#ffffff; }
      .mut   { font-size:11px; }
      .flow  { stroke:#5b7186; stroke-width:2.4; fill:none; }
      .flowt { stroke:#1bb3a3; stroke-width:2.6; fill:none; }
    </style>
    <marker id="s1" markerWidth="11" markerHeight="11" refX="8" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 z" fill="#5b7186"/></marker>
    <marker id="s1t" markerWidth="11" markerHeight="11" refX="8" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 z" fill="#1bb3a3"/></marker>
  </defs>

  <rect width="1040" height="600" fill="#ffffff"/>
  <text x="40" y="46" class="title">The swap point</text>
  <text x="40" y="70" class="sub">A simulated sensor and a real sensor publish the same fact. The consumer never knows which.</text>

  <!-- Simulated sensors (dashed teal) -->
  <rect x="56" y="120" width="270" height="120" rx="12" fill="#e7f7f4" stroke="#1bb3a3" stroke-width="2.5" stroke-dasharray="9 6"/>
  <text x="191" y="158" text-anchor="middle" font-size="16" font-weight="700" fill="#0f7a6e">Simulated sensors</text>
  <text x="191" y="182" text-anchor="middle" font-size="12" fill="#0f7a6e">scenario engine · sensor models</text>
  <text x="191" y="204" text-anchor="middle" font-size="12" fill="#0f7a6e">scores against known ground truth</text>
  <text x="191" y="226" text-anchor="middle" class="mut" fill="#6b7a8d">development / CI</text>

  <!-- Real sensors -->
  <rect x="56" y="360" width="270" height="120" rx="12" fill="#1c3a5e"/>
  <text x="191" y="398" text-anchor="middle" font-size="16" font-weight="700" class="w">Real sensors</text>
  <text x="191" y="422" text-anchor="middle" font-size="12" class="w">ESP32 · SDR · mic · camera</text>
  <text x="191" y="444" text-anchor="middle" font-size="12" class="w">one modality swapped in at a time</text>
  <text x="191" y="466" text-anchor="middle" class="mut" fill="#8fb8d6">field deployment</text>

  <text x="191" y="516" text-anchor="middle" font-size="13" font-weight="700" fill="#0f2540">the producer is interchangeable</text>

  <!-- Fact bar (center) -->
  <rect x="430" y="250" width="230" height="100" rx="14" fill="#0f2540"/>
  <text x="545" y="288" text-anchor="middle" font-size="14" font-weight="700" class="w">airspace.</text>
  <text x="545" y="308" text-anchor="middle" font-size="14" font-weight="700" class="w">contact_observed</text>
  <text x="545" y="332" text-anchor="middle" font-size="11" fill="#8fb8d6">one identical schema</text>

  <!-- converging arrows -->
  <path class="flowt" marker-end="url(#s1t)" d="M326,180 C380,200 390,250 428,278"/>
  <path class="flow"  marker-end="url(#s1)"  d="M326,420 C380,400 390,350 428,322"/>

  <!-- Fusion stack (unchanged) -->
  <rect x="740" y="150" width="270" height="300" rx="14" fill="#f4f8fb" stroke="#9bb0c4" stroke-width="2"/>
  <text x="875" y="180" text-anchor="middle" font-size="14" font-weight="700" fill="#33506f">Unchanged fusion stack</text>

  <rect x="766" y="200" width="218" height="58" rx="9" fill="#1bb3a3"/>
  <text x="875" y="226" text-anchor="middle" font-size="14" font-weight="700" fill="#06302b">fuse_airspace</text>
  <text x="875" y="245" text-anchor="middle" font-size="10" fill="#06302b">correlate to tracks</text>

  <rect x="766" y="276" width="218" height="48" rx="24" fill="#0f2540"/>
  <text x="875" y="305" text-anchor="middle" font-size="13" font-weight="700" class="w">airspace.track_confirmed</text>

  <rect x="766" y="342" width="218" height="54" rx="9" fill="#f5a623"/>
  <text x="875" y="375" text-anchor="middle" font-size="14" font-weight="700" fill="#5a3d00">alert_operators</text>

  <text x="875" y="430" text-anchor="middle" font-size="12" fill="#33506f">console · federation · C2</text>

  <path class="flow" marker-end="url(#s1)" d="M660,300 L740,300"/>
  <text x="875" y="492" text-anchor="middle" font-size="13" font-weight="700" fill="#0f2540">the consumer never changes</text>

  <text x="40" y="586" class="mut" fill="#6b7a8d">Build the whole stack against simulation, then replace synthetic emitters with hardware one at a time. Fusion is untouched either way.</text>
</svg>
